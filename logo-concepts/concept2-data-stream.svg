<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Concept 2: Sleek ferry with a data-stream wake — the boat leaves a trail of bits/arrows -->
  <defs>
    <linearGradient id="hull2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="water2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Subtle water line -->
  <path d="M0 175 Q80 165 160 175 Q240 185 320 175 Q360 170 400 175 L400 300 L0 300 Z" fill="url(#water2)"/>

  <!-- Data stream wake (dots getting smaller/fading to the left) -->
  <circle cx="72" cy="178" r="3" fill="#0ea5e9" opacity="0.12"/>
  <circle cx="90" cy="180" r="3" fill="#0ea5e9" opacity="0.18"/>
  <circle cx="108" cy="177" r="3.5" fill="#0ea5e9" opacity="0.25"/>
  <circle cx="126" cy="179" r="3.5" fill="#0ea5e9" opacity="0.32"/>
  <circle cx="144" cy="176" r="4" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="162" cy="178" r="4" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="180" cy="175" r="4.5" fill="#0ea5e9" opacity="0.6"/>

  <!-- Ferry — sleek, pointed, modern catamaran-style -->
  <path d="M200 170 L310 155 L320 160 L310 168 L200 178 Z" fill="url(#hull2)"/>
  <path d="M200 178 L310 168 L320 173 L310 180 L200 185 Z" fill="url(#hull2)" opacity="0.7"/>

  <!-- Cabin/superstructure -->
  <rect x="230" y="148" width="55" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="240" y="142" width="30" height="10" rx="3" fill="#e2e8f0"/>

  <!-- Small flag/antenna -->
  <line x1="258" y1="142" x2="258" y2="126" stroke="#334155" stroke-width="1.5"/>
  <path d="M258 126 L272 130 L258 134" fill="#0ea5e9" opacity="0.9"/>

  <!-- Transfer arrows — two curved arrows suggesting bidirectional transfer -->
  <g transform="translate(140, 60)">
    <!-- Right arrow -->
    <path d="M0 20 Q30 8 60 20" stroke="#0284c7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="57,15 65,20 57,25" fill="#0284c7"/>

    <!-- Left arrow -->
    <path d="M60 35 Q30 47 0 35" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="3,30 -5,35 3,40" fill="#0ea5e9"/>
  </g>

  <!-- Left node (local) -->
  <g transform="translate(115, 68)">
    <rect x="0" y="0" width="22" height="18" rx="3" fill="#334155"/>
    <rect x="4" y="4" width="14" height="3" rx="1" fill="#94a3b8"/>
    <rect x="4" y="10" width="10" height="3" rx="1" fill="#94a3b8"/>
  </g>

  <!-- Right node (remote) -->
  <g transform="translate(228, 68)">
    <rect x="0" y="0" width="22" height="18" rx="3" fill="#334155"/>
    <circle cx="11" cy="9" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="11" cy="9" r="1.5" fill="#94a3b8"/>
  </g>

  <!-- Text -->
  <text x="200" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-1">ferry</text>
</svg>

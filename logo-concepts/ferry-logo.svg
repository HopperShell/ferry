<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" width="680" height="240">
  <defs>
    <linearGradient id="channel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="boat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- === ICON (200x200 centered in 240h) === -->
  <g transform="translate(24, 20)">
    <!-- Left shore — local/terminal -->
    <rect x="0" y="0" width="68" height="200" rx="16" fill="url(#shore)"/>
    <!-- Terminal lines -->
    <rect x="14" y="70" width="14" height="2.5" rx="1.25" fill="#38bdf8" opacity="0.8"/>
    <rect x="14" y="80" width="38" height="2.5" rx="1.25" fill="#475569" opacity="0.5"/>
    <rect x="14" y="90" width="28" height="2.5" rx="1.25" fill="#475569" opacity="0.38"/>
    <rect x="14" y="100" width="42" height="2.5" rx="1.25" fill="#475569" opacity="0.28"/>
    <rect x="14" y="110" width="22" height="2.5" rx="1.25" fill="#475569" opacity="0.2"/>

    <!-- Channel -->
    <rect x="78" y="12" width="44" height="176" rx="8" fill="url(#channel)"/>

    <!-- Ferry — side view, pointing right, centered in channel -->
    <g transform="translate(100, 100)">
      <!-- Hull -->
      <path d="M-18 -2 L-14 -8 L16 -8 L22 -2 Q22 4 16 6 L-14 6 Q-18 4 -18 -2 Z" fill="url(#boat)"/>
      <!-- Cabin -->
      <rect x="-8" y="-14" width="18" height="7" rx="2.5" fill="#e2e8f0"/>
      <!-- Mast/antenna -->
      <line x1="2" y1="-14" x2="2" y2="-20" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Subtle wake behind ferry -->
    <line x1="80" y1="100" x2="82" y2="100" stroke="#0ea5e9" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

    <!-- Right shore — remote/server -->
    <rect x="132" y="0" width="68" height="200" rx="16" fill="url(#shore)"/>
    <!-- Server rack rows -->
    <rect x="146" y="72" width="40" height="13" rx="3.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="178" cy="78.5" r="2.5" fill="#22c55e" opacity="0.75"/>
    <rect x="150" y="77" width="16" height="1.5" rx="0.75" fill="#475569" opacity="0.5"/>

    <rect x="146" y="90" width="40" height="13" rx="3.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="178" cy="96.5" r="2.5" fill="#0ea5e9" opacity="0.65"/>
    <rect x="150" y="95" width="16" height="1.5" rx="0.75" fill="#475569" opacity="0.5"/>

    <rect x="146" y="108" width="40" height="13" rx="3.5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="178" cy="114.5" r="2.5" fill="#475569" opacity="0.35"/>
    <rect x="150" y="113" width="16" height="1.5" rx="0.75" fill="#475569" opacity="0.5"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="290" y="152" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="#0f172a" letter-spacing="-4">ferry</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Concept 1: Cable Ferry — two terminals connected by a cable with a ferry carrying a file icon -->
  <defs>
    <linearGradient id="water1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="hull1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <!-- Water -->
  <path d="M0 200 Q50 190 100 200 Q150 210 200 200 Q250 190 300 200 Q350 210 400 200 L400 300 L0 300 Z" fill="url(#water1)"/>
  <path d="M0 215 Q60 205 120 215 Q180 225 240 215 Q300 205 360 215 Q380 220 400 215 L400 300 L0 300 Z" fill="url(#water1)"/>

  <!-- Left terminal (tower/pylon) -->
  <rect x="48" y="110" width="12" height="90" rx="3" fill="#334155"/>
  <rect x="44" y="105" width="20" height="12" rx="3" fill="#475569"/>

  <!-- Right terminal (tower/pylon) -->
  <rect x="340" y="110" width="12" height="90" rx="3" fill="#334155"/>
  <rect x="336" y="105" width="20" height="12" rx="3" fill="#475569"/>

  <!-- Cable -->
  <path d="M54 111 Q200 85 346 111" stroke="#64748b" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ferry hull -->
  <path d="M155 195 L160 175 L240 175 L245 195 Q200 202 155 195 Z" fill="url(#hull1)"/>

  <!-- Ferry deck -->
  <rect x="165" y="165" width="70" height="12" rx="2" fill="#e2e8f0"/>

  <!-- File icon on the ferry -->
  <g transform="translate(188, 132)">
    <path d="M0 4 L0 30 Q0 33 3 33 L21 33 Q24 33 24 30 L24 10 L18 4 Z" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <path d="M18 4 L18 10 L24 10" fill="#e2e8f0" stroke="#334155" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Data lines on file -->
    <line x1="5" y1="15" x2="19" y2="15" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="16" y2="20" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="25" x2="18" y2="25" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Cable attachment to ferry -->
  <line x1="200" y1="96" x2="200" y2="165" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Direction arrow on cable -->
  <polygon points="270,100 280,96 270,92" fill="#0ea5e9" opacity="0.8"/>
  <polygon points="290,98 300,94 290,90" fill="#0ea5e9" opacity="0.5"/>

  <!-- Text -->
  <text x="200" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-1">ferry</text>
</svg>

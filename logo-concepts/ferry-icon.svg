<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="ic-channel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ic-boat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="ic-shore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <g transform="translate(16, 16)">
    <!-- Left shore -->
    <rect x="0" y="0" width="80" height="224" rx="18" fill="url(#ic-shore)"/>
    <!-- Terminal lines -->
    <rect x="18" y="78" width="16" height="3" rx="1.5" fill="#38bdf8" opacity="0.8"/>
    <rect x="18" y="90" width="44" height="3" rx="1.5" fill="#475569" opacity="0.5"/>
    <rect x="18" y="102" width="32" height="3" rx="1.5" fill="#475569" opacity="0.38"/>
    <rect x="18" y="114" width="48" height="3" rx="1.5" fill="#475569" opacity="0.28"/>
    <rect x="18" y="126" width="26" height="3" rx="1.5" fill="#475569" opacity="0.2"/>

    <!-- Channel -->
    <rect x="92" y="14" width="40" height="196" rx="8" fill="url(#ic-channel)"/>

    <!-- Ferry -->
    <g transform="translate(112, 112)">
      <path d="M-20 -2 L-16 -9 L18 -9 L24 -2 Q24 5 18 7 L-16 7 Q-20 5 -20 -2 Z" fill="url(#ic-boat)"/>
      <rect x="-9" y="-16" width="20" height="8" rx="3" fill="#e2e8f0"/>
      <line x1="3" y1="-16" x2="3" y2="-23" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Right shore -->
    <rect x="144" y="0" width="80" height="224" rx="18" fill="url(#ic-shore)"/>
    <!-- Server rack -->
    <rect x="160" y="80" width="48" height="15" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="198" cy="87.5" r="3" fill="#22c55e" opacity="0.75"/>
    <rect x="165" y="86" width="20" height="2" rx="1" fill="#475569" opacity="0.5"/>

    <rect x="160" y="101" width="48" height="15" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="198" cy="108.5" r="3" fill="#0ea5e9" opacity="0.65"/>
    <rect x="165" y="107" width="20" height="2" rx="1" fill="#475569" opacity="0.5"/>

    <rect x="160" y="122" width="48" height="15" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="198" cy="129.5" r="3" fill="#475569" opacity="0.35"/>
    <rect x="165" y="128" width="20" height="2" rx="1" fill="#475569" opacity="0.5"/>
  </g>
</svg>
